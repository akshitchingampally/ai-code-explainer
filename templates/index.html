<!DOCTYPE html>
<html>
<head>
<title>AI Code Explainer</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>AI Code Explainer</h1>

<textarea id="code" placeholder="Paste your code here"></textarea>

<br><br>

<button onclick="explainCode()">Explain Code</button>

<h3>Explanation</h3>

<div id="result"></div>

<script>

async function explainCode(){

const code = document.getElementById("code").value;

const response = await fetch("/explain",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({code:code})
});

const data = await response.json();

document.getElementById("result").innerText = data.explanation;

}

</script>

</body>
</html>
